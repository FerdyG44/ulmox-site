<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>ULMOX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #24113f 0%, #05030a 42%, #000 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 70px 24px 40px;
    }

    .logo-wrap {
      margin-bottom: 55px;
    }

    .logo-img {
      width: 110px;
      padding: 18px;
      border-radius: 28px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 18px 50px rgba(120,80,255,0.45);
    }

    .logo-text {
      margin-top: 18px;
      font-size: 22px;
      letter-spacing: 5px;
      font-weight: 900;
    }

    h1 {
      font-size: 58px;
      line-height: 1.05;
      margin: 0;
      font-weight: 900;
    }

    .gradient-text {
      background: linear-gradient(90deg, #ffffff, #b794ff, #66e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 24px auto 0;
      max-width: 620px;
      color: #cfcfd6;
      font-size: 20px;
      line-height: 1.5;
    }

    .store-badges {
      margin-top: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .store-badge-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
      text-decoration: none;
      border-radius: 12px;
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .store-badge-link:hover {
      filter: drop-shadow(0 10px 22px rgba(120,80,255,0.24));
      transform: scale(1.03);
    }

    .store-badge {
      display: block;
      width: auto;
      max-width: min(260px, 44vw);
      object-fit: contain;
    }

    .store-badge-app-store {
      height: 60px;
    }

    .store-badge-google-play {
      height: 66px;
    }



    .phone-card {
      margin: 24px auto 0;
      width: 260px;
      height: 520px;
      border-radius: 46px;
      background: linear-gradient(180deg, #171722, #07070b);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 30px 90px rgba(120,80,255,0.35);
      padding: 18px;
    }

    .phone-screen {
      height: 100%;
      border-radius: 34px;
      overflow: hidden;
      position: relative;
      background: radial-gradient(circle at top, #6d28d9 0%, #111827 40%, #020617 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-screen video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 34px;
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .phone-fallback {
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .play-circle {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 34px;
    }

    .phone-text {
      font-size: 18px;
      font-weight: 800;
    }

    .features {
      margin-top: 70px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .feature {
      padding: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .feature h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .feature p {
      margin: 0;
      color: #aaa;
      font-size: 14px;
      line-height: 1.4;
    }

    footer {
      margin-top: 70px;
      color: #777;
      font-size: 14px;
    }

    footer a {
      color: #aaa;
      margin: 0 10px;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 42px; }
      .subtitle { font-size: 17px; }
      .phone-card { width: 220px; height: 440px; }
      .logo-img { width: 95px; }

      .store-badges {
        flex-direction: column;
        gap: 10px;
      }
      .store-badge { max-width: min(240px, 78vw); }
      .store-badge-app-store { height: 56px; }
      .store-badge-google-play { height: 62px; }
    }
  </style>
  <link rel="stylesheet" href="/assets/css/language-switcher.css">
</head>

<body>
  <div class="container">

      <div class="logo-text">ULMOX</div>
    </div>

    <h1>
      分享真实的<br>
      <span class="gradient-text">视频瞬间。</span>
    </h1>

    <p class="subtitle">
      与世界各地的人分享真实的视频瞬间。
      捕捉真实体验，接收意想不到的时刻，

    </p>

    <div class="store-badges">

        <img class="store-badge store-badge-app-store" src="/assets/badges/app-store.svg" width="162" height="54" alt="Download on the App Store">
      </a>

      <a class="store-badge-link" href="https://play.google.com/store/apps/details?id=com.ulmox.app" target="_blank" aria-label="Get ULMOX on Google Play">

        </div>

        <video autoplay muted loop playsinline>

    </div>

    <div class="features">
      <div class="feature">
        <h3>真实视频</h3>
        <p>没有刻意摆拍。捕捉真正有感觉的瞬间。</p>
      </div>

      <div class="feature">
        <h3>每日瞬间</h3>
        <p>有限制的每日分享机制。</p>
      </div>

      <div class="feature">
        <h3>全球动态</h3>
        <p>将精选瞬间分享给世界。</p>
      </div>
    </div>

    <div style="margin-top:60px;">
    <h2 style="font-size:28px;">现已登陆 App Store 和 Google Play</h2>
    <p style="color:#aaa;max-width:600px;margin:10px auto 25px;">
      立即从 App Store 或 Google Play 下载 ULMOX，开始分享真实的视频瞬间。
    </p>



</div>

    <footer>
      <a href="privacy.html">隐私政策</a>
      <a href="terms.html">条款</a>
      <a href="support.html">支持</a>
      <a href="safety.html">安全与审核</a>
      <p>© 2026 ULMOX</p>
    </footer>

  </div>
  <script src="/assets/js/i18n-config.js"></script>
  <script src="/assets/js/language-switcher.js" defer></script>
</body>
</html>
